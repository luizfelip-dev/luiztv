<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuizTV</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="navbar">
    <div class="logo">LuizTV</div>

    <div class="nav-links">
      <button onclick="filterCategory('all')">Início</button>
      <button onclick="filterCategory('sports')">⚽ Esportes</button>
      <button onclick="filterCategory('news')">📰 Notícias</button>
      <button onclick="filterCategory('music')">🎵 Música</button>
      <button onclick="filterCategory('kids')">🧒 Infantil</button>
      <button onclick="showFavorites()">⭐ Favoritos</button>
      <button onclick="showMostWatched()">🔥 Mais vistos</button>
    </div>

    <input id="search" placeholder="Buscar canal...">
  </header>

  <section class="banner">
    <div class="banner-info">
      <h1 id="channel-name">LuizTV</h1>
      <p id="channel-desc">Escolha um canal para assistir.</p>
      <button id="favoriteBtn">⭐ Favoritar</button>
    </div>

    <video id="video" controls autoplay></video>
  </section>

  <main id="categories">
    <p class="loading">Carregando canais...</p>
  </main>

  <footer>
    Fonte: vibe coder
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="script.js"></script>
</body>
</html>
