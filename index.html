<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LuizTV</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="hero">
    <nav>
      <h1>LuizTV</h1>
      <input type="text" id="search" placeholder="Buscar canais..." />
    </nav>

    <div class="hero-content">
      <h2 id="channel-name">Escolha um canal</h2>
      <p>Canais públicos IPTV-org organizados por categoria.</p>
      <video id="video" controls autoplay></video>
    </div>
  </header>

  <main id="categories">
    <p class="loading">Carregando canais...</p>
  </main>

  <footer>
    <p>Fonte: IPTV-org • Projeto para estudos</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="script.js"></script>
</body>
</html>
